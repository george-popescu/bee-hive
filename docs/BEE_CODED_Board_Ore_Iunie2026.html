  const ppl=Object.entries(pm).sort((a,b)=>b[1]-a[1]).map(([n,m])=>`<span class="pchip">${n} · ${fmt(m)}</span>`).join("")||'<span class="empty">—</span>';
  const bars=WEEKS.map(w=>`<div class="wbar ${ST.week===w.i?"sel":""}" onclick="ST.week=${w.i};wksel();kpis();render()" title="${w.lbl} ${w.range}: ${fmt(wt[w.i])}"><div class="fill" style="height:${Math.round(wt[w.i]/wm*30)}px;background:${col}"></div><span class="wl">${w.lbl}</span></div>`).join("");
  return `<div class="pcard"><div class="phead"><span class="pname"><i class="dot" style="background:${col}"></i>${proj} ${ST.pm==="ALL"?`<span class="pmtag">· ${PROJ_PM[proj]||""}</span>`:""}</span><div class="wbars">${bars}</div><span class="ptot">${fmt(tot)}</span></div><div class="col"><div class="coltitle">✅ Ce s-a lucrat ${ST.week==="ALL"?"(iunie)":"("+WEEKS[ST.week].range+")"}</div>${rows}</div><div class="ppl">${ppl}</div></div>`;}).join("")||'<div class="empty">Nimic.</div>';}
function renderPerson(c){const e=scopeWeek();if(!e.length){c.innerHTML='<div class="empty">Nimic.</div>';return;}
 const g={};e.forEach(x=>{g[x.person]=g[x.person]||{t:0,sp:{},tk:{}};g[x.person].t+=x.ms;g[x.person].sp[x.project]=(g[x.person].sp[x.project]||0)+x.ms;const k=x.task+"||"+x.status+"||"+x.project;g[x.person].tk[k]=(g[x.person].tk[k]||0)+x.ms;});
 c.innerHTML=Object.entries(g).sort((a,b)=>b[1].t-a[1].t).map(([n,d])=>{const bars=Object.entries(d.sp).sort((a,b)=>b[1]-a[1]).map(([k,v])=>`<div class="seg" title="${k}: ${fmt(v)}" style="width:${(v/d.t*100).toFixed(1)}%;background:${PROJECTS[k]||"#94a3b8"}"></div>`).join("");
  const tasks=Object.entries(d.tk).sort((a,b)=>b[1]-a[1]).map(([k,ms])=>{const[tn,st,pr]=k.split("||"),td=(st||"").toLowerCase()==="to do";return `<div class="tline"><span class="pill" style="background:${(PROJECTS[pr]||"#94a3b8")}22;color:${PROJECTS[pr]||"#64748b"}">${pr}</span><span class="tname">${esc(tn)}</span>${td?'<span class="flag">⚠</span>':''}<span class="tot">${fmt(ms)}</span></div>`;}).join("");
  return `<div class="card"><div class="row" onclick="this.parentNode.classList.toggle('open')"><span class="chev">▶</span><span class="nm">${n}</span><div class="bar">${bars}</div><span class="subnums">${Object.keys(d.sp).length} proiecte</span><span class="tot">${fmt(d.t)}</span></div><div class="detail">${tasks}</div></div>`;}).join("");}
function dmy(ms){if(!ms)return"?";const d=new Date(+ms);return String(d.getDate()).padStart(2,"0")+"."+String(d.getMonth()+1).padStart(2,"0")+"."+d.getFullYear();}
function renderLeave(c){const order={"on leave":0,"approved":1,"requires approval":2};
 const grp={"În concediu / Aprobate":[],"Așteaptă aprobare":[],"Altele":[]};
 LEAVES.forEach(l=>{if(["on leave","approved"].includes(l.status))grp["În concediu / Aprobate"].push(l);else if(l.status==="requires approval")grp["Așteaptă aprobare"].push(l);else grp["Altele"].push(l);});
 const cls=s=>s==="on leave"?"leave":s==="approved"?"appr":"req";
 const rows=a=>a.sort((x,y)=>(+(x.start||x.due||0))-(+(y.start||y.due||0))).map(l=>`<div class="lvrow"><span class="lvname">${l.name}</span><span class="lvper">${l.start?dmy(l.start)+" – ":""}${dmy(l.due)}${l.days?' · '+l.days+' zile':''}</span><span class="st ${cls(l.status)}">${l.status}</span></div>`).join("");
 let h="";["În concediu / Aprobate","Așteaptă aprobare","Altele"].forEach(k=>{if(grp[k].length)h+=`<div class="pcard"><div class="grouphdr">${k} · ${grp[k].length}</div>${rows(grp[k])}</div>`;});
 c.innerHTML=h||'<div class="empty">Fără concedii.</div>';}
document.querySelectorAll(".tab").forEach(t=>t.onclick=()=>{document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));t.classList.add("active");ST.view=t.dataset.v;kpis();render();});
pmsel();wksel();legend();kpis();render();
</script>
